{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FarmMed</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            transition: transform 0.3s ease;
        }
        .auth-card:hover {
            transform: translateY(-5px);
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0083b0;
            margin-bottom: 10px;
            text-align: center;
        }
        .auth-title {
            font-size: 1.25rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-primary {
            background: linear-gradient(to right, #00b4db, #0083b0);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 5px 15px rgba(0, 131, 176, 0.4);
            transform: scale(1.02);
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 3px rgba(0, 131, 176, 0.1);
            border-color: #0083b0;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .login-link a {
            color: #0083b0;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        /* Grid for form fields to make it look better */
        .asteriskField {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand-logo">FarmMed</div>
        <div class="auth-title">Join our pharmacy network.</div>
        
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-12">
                    {{ form|crispy }}
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Register Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</body>
</html>
