{% extends 'base.html' %}

{% block content %}

<h3 class="mb-3">Sales History</h3>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Total</th>
            <th>Items</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for sale in sales %}
        <tr>
            <td>#{{ sale.id }}</td>
            <td>{{ sale.created_at }}</td>
            <td>৳{{ sale.total_amount }}</td>
            <td>{{ sale.items.count }}</td>
            <td>
                <a href="{% url 'sale_receipt' sale.id %}" class="btn btn-sm btn-primary">
                    View
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
